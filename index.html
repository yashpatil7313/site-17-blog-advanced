<!DOCTYPE html>
<html>
<head>
    <title>Advanced Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <h2>My Blog 📝</h2>
    </nav>

    <!-- MAIN LAYOUT -->
    <div class="container">

        <!-- BLOG POSTS -->
        <main>
            <div class="post">
                <h3>Post 1</h3>
                <p>This is my first blog post content.</p>
            </div>

            <div class="post">
                <h3>Post 2</h3>
                <p>This is my second blog post content.</p>
            </div>
        </main>

        <!-- SIDEBAR -->
        <aside>
            <h3>Categories</h3>
            <ul>
                <li>Tech</li>
                <li>Sports</li>
                <li>Business</li>
            </ul>
        </aside>

    </div>

</body>
</html>
